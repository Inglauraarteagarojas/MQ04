<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor MQ-4</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f7fb;
      margin:0;
      padding:20px;
      color:#1d2a3a;
    }
    .card{
      max-width:900px;
      margin:auto;
      background:white;
      border-radius:18px;
      padding:24px;
      box-shadow:0 8px 30px rgba(0,0,0,0.10);
    }
    h1{text-align:center;}
    .ppm{
      font-size:2.2rem;
      font-weight:bold;
      text-align:center;
      margin:18px 0 8px 0;
    }
    .estado{
      text-align:center;
      font-size:1.2rem;
      font-weight:bold;
      margin-bottom:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:20px;
    }
    .dato{
      font-size:1.05rem;
      padding:14px;
      background:#eef4ff;
      border-radius:12px;
    }
    .barra-box{
      margin:20px 0;
    }
    .barra{
      width:100%;
      height:24px;
      background:#dde7f5;
      border-radius:999px;
      overflow:hidden;
    }
    .relleno{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#4caf50,#ffb300,#e53935);
      transition:width 0.6s ease;
    }
    canvas{
      margin-top:25px;
    }
    @media (max-width:700px){
      .grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Monitor de Metano MQ-4</h1>
    <div class="ppm" id="ppm">Cargando...</div>
    <div class="estado" id="estado">Cargando...</div>

    <div class="barra-box">
      <div class="barra">
        <div class="relleno" id="relleno"></div>
      </div>
    </div>

    <div class="grid">
      <div class="dato" id="adc">ADC crudo: --</div>
      <div class="dato" id="mv">Voltaje: -- mV</div>
      <div class="dato" id="escala">Escala ADC: -- %</div>
      <div class="dato" id="ip">IP del ESP32: --</div>
    </div>

    <canvas id="graficoPPM"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
